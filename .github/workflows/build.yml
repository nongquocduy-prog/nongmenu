name: Build dylib

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build dylib
        run: |
          clang -dynamiclib NongMenu.m -o NongMenu.dylib

      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: NongMenu
          path: NongMenu.dylib
